<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>旅遊行程規劃網站</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-secondary mb-4">⬅️ 回首頁</a>
        <h2 class="mb-4">🗺️ 旅遊行程規劃網站</h2>
        
        <div class="card p-4 shadow-sm mb-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="city" class="form-label">旅遊目的地：</label>
                        <select name="city" id="city" class="form-select">
                            <option value="台北">台北</option>
                            <option value="台中">台中</option>
                            <option value="高雄">高雄</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="days" class="form-label">天數：</label>
                        <input type="number" name="days" id="days" class="form-control" min="1" max="2" value="1">
                    </div>
                </div>
                <button type="submit" class="btn btn-success mt-3">產生專屬行程</button>
            </form>
        </div>

        {% if itinerary %}
        <div class="card p-4 shadow-sm">
            <h3 class="text-success mb-3">🚗 {{ city }} {{ days }}日遊 行程規劃結果：</h3>
            {% for day_plan in itinerary %}
                <div class="mb-3">
                    <h5>第 {{ day_plan.day }} 天</h5>
                    <ul>
                        {% for spot in day_plan.spots %}
                        <li>{{ spot }}</li>
                        {% endfor %}
                    </ul>
                </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>
</html>
