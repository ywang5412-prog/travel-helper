<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智慧旅遊一站式助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h1 class="display-4 fw-bold mb-4">🌍 智慧旅遊一站式助手</h1>
        <p class="lead text-muted mb-5">期末報告作品：結合美食、景點規劃與天氣交通的綜合系統</p>
        
        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title">🍕 美食推薦</h3>
                        <p class="card-text">不知道吃什麼？讓系統幫你挑選在地必吃美味！</p>
                        <a href="/food" class="btn btn-primary">前往美食推薦</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title">🗺️ 行程規劃</h3>
                        <p class="card-text">客製化天數行程，一鍵搞定旅遊景點排程。</p>
                        <a href="/travel" class="btn btn-success">前往行程規劃</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title">☀️ 天氣交通</h3>
                        <p class="card-text">查詢目的地即時天氣與最佳交通工具建議。</p>
                        <a href="/weather" class="btn btn-warning text-white">前往天氣交通</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
