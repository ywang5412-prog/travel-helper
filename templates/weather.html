<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>天氣預報與交通推薦</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-secondary mb-4">⬅️ 回首頁</a>
        <h2 class="mb-4">☀️ 天氣預報與交通推薦網站</h2>
        
        <div class="card p-4 shadow-sm mb-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="city" class="form-label">查詢城市：</label>
                    <select name="city" id="city" class="form-select">
                        <option value="台北">台北</option>
                        <option value="台中">台中</option>
                        <option value="高雄">高雄</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-warning text-white">查詢天氣與交通</button>
            </form>
        </div>

        {% if weather %}
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-3 border-warning h-100">
                    <h5 class="text-warning">🌈 即時天氣預報 ({{ city }})</h5>
                    <p class="mt-2 lead">{{ weather }}</p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 border-info h-100">
                    <h5 class="text-info">🚌 交通出行建議</h5>
                    <p class="mt-2 lead">{{ transport }}</p>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
