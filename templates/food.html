<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美食推薦系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-secondary mb-4">⬅️ 回首頁</a>
        <h2 class="mb-4">🍕 智慧美食推薦系統</h2>
        
        <div class="card p-4 shadow-sm mb-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="city" class="form-label">選擇你想找美食的城市：</label>
                    <select name="city" id="city" class="form-select">
                        <option value="台北">台北</option>
                        <option value="台中">台中</option>
                        <option value="高雄">高雄</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">隨機推薦美食</button>
            </form>
        </div>

        {% if foods %}
        <div class="alert alert-success">
            <h4>🎯 在 {{ city }} 為您推薦的美食有：</h4>
            <ul>
                {% for food in foods %}
                <li class="lead">{{ food }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
